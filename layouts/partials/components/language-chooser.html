{{ $page := .page }}
{{ $class := .class }}

{{- if $page.IsTranslated -}}
  <div class="flex justify-items-start {{ with $class }}{{ . | safeCSS }}{{ end }}">
    {{ range first 1 $page.Translations }}
      <a
        href="{{ .Permalink }}"
        class="inline-flex h-7 min-w-9 items-center justify-center rounded-md px-2 text-xs font-semibold uppercase tracking-normal text-gray-700 transition-colors hover:bg-gray-100 hover:text-gray-950 dark:text-gray-300 dark:hover:bg-primary-100/5 dark:hover:text-white"
        hreflang="{{ .Lang }}"
        aria-label="Switch language to {{ index site.Data.languages .Lang }}"
        title="{{ index site.Data.languages .Lang }}"
      >
        {{ $page.Lang | upper }}
      </a>
    {{ end }}
  </div>
{{- end -}}
